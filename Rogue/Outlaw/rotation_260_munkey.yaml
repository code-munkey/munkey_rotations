spec: 260
name: "Roll the dice (M+)"
author: "Munkey"
version: "1.5"
description: "Outlaw Rogue rotation based on multiple sources and logs"
entry: main

movement_allowed: true

config:
  mh_poison:
    label: "Lethal posion"
    type: dropdown
    options:
      - label: "None"
        value: 1
      - label: "Instant"
        value: 2
      - label: "Wound"
        value: 3
    default: 1
  oh_poison:
    label: "Non-lethal posion"
    type: dropdown
    options:
      - label: "None"
        value: 1
      - label: "Atrophic"
        value: 2
      - label: "Crippling"
        value: 3
      - label: "Numbing"
        value: 4
    default: 1
  auto_stealth:
    label: "Auto-stealth"
    type: checkbox
    default: true
  blade_rush_range:
    label: "Blade rush max range"
    type: slider
    min: 5
    max: 20
    default: 5
  auto_target:
    label: "Auto-target"
    type: checkbox
    default: true
  kir_min_buffs:
    label: "Keep It Rolling Min Buffs"
    type: slider
    min: 2
    max: 4
    default: 2
    description: "Min buffs to use Keep It Rolling"
  finisher_cp:
    label: "Finisher CP"
    type: slider
    min: 5
    max: 6
    default: 6
    description: "CP for Between the Eyes"
  dispatch_cp:
    label: "Dispatch CP"
    type: slider
    min: 5
    max: 6
    default: 5
    description: "CP for Dispatch"
  auto_defensives:
    label: "Auto Defensives"
    type: checkbox
    default: true
  crimson_vial_pct:
    label: "Crimson Vial HP %"
    type: slider
    min: 10
    max: 90
    default: 50

variables:
  rtb_buff_count: ((1*buff.one_of_a_kind.up)+(2*buff.double_trouble.up)+(3*buff.triple_threat.up)+(4*buff.jackpot.up))
  stealth_up: buff.stealth.up|buff.vanish.up|buff.shadow_dance.up
  hp_low: health.pct<config.crimson_vial_pct
  finish_condition: (combo_points>=combo_points.max-1-(1*(!cooldown.between_the_eyes.ready)&((talent.hand_of_fate.enabled)|(cooldown.killing_spree.ready))))
  cancel_spree: energy.time_to_max<2&var.finish_condition&(player.channeling&prev_gcd.1.killing_spree)

lists:

  interrupts:
    - kick,if=interrupt.target.check
    - kick.focus,if=interrupt.focus.check
    - kick.mouseover,if=interrupt.mouseover.check
    - kidney_shot,if=target.should_stun&combo_points<=2
    - shiv,if=target.purgeable.enrage
    - blind,if=interrupt.target.check

  system:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_heal
    - call_action_list,name=precombat
    - call_action_list,name=interrupts

  poisons:
    - instant_poison,range_check=none,if=config.mh_poison=2&(buff.instant_poison.down&!prev_gcd.1.instant_poison)
    - wound_poison,range_check=none,if=config.mh_poison=3&(buff.wound_poison.down&!prev_gcd.1.wound_poison)
    - atrophic_poison,range_check=none,if=config.oh_poison=2&(buff.atrophic_poison.down&!prev_gcd.1.atrophic_poison)
    - crippling_poison,range_check=none,if=config.oh_poison=3&(buff.crippling_poison.down&!prev_gcd.1.crippling_poison)
    - numbing_poison,range_check=none,if=config.oh_poison=4&(buff.numbing_poison.down&!prev_gcd.1.numbing_poison)
  main:
    - stop_casting,if=var.cancel_spree
    - call_action_list,name=system
    - call_action_list,name=poisons
    - call_action_list,name=defensives,if=config.auto_defensives&player.combat
    - stealth,range_check=none,if=!player.combat&!var.stealth_up&config.auto_stealth
    - return,if=!player.combat&!target.combat
    - target_enemy,delay=100,if=config.auto_target&(target.dead|!target.attackable|!target.combat|(target.range>=8&player.combat)&enemies.combat.8y>0)
    - return,if=!target.combat|target.range>8
    - run_action_list,name=finisher,if=var.finish_condition
    - call_action_list,name=cds
    - call_action_list,name=build

  finisher:
    - between_the_eyes
    - killing_spree
    - coup_de_grace
    - dispatch,if=combo_points>=config.dispatch_cp

  cds:
    - preparation,if="!cooldown.between_the_eyes.ready&!cooldown.adrenaline_rush.ready&!cooldown.blade_rush.ready"
    - roll_the_bones,if=var.rtb_buff_count<config.kir_min_buffs
    - keep_it_rolling,if=var.rtb_buff_count>=config.kir_min_buffs
    - adrenaline_rush,if=(!talent.improved_adrenaline_rush.enabled&buff.adrenaline_rush.down)|(talent.improved_adrenaline_rush.enabled&buff.adrenaline_rush.down&combo_points<=2)
    - blade_flurry,if=enemies.combat.8y>=2&buff.blade_flurry.remains<gcd
    - blade_rush,if=target.range<=config.blade_rush_range
    - vanish,if=!variable.finish_condition&talent.hidden_opportunity&!buff.audacity.up&!buff.opportunity.up
    - shadowmeld,if=!variable.finish_condition&talent.hidden_opportunity&!buff.audacity.up&!buff.opportunity.up
    - potion,if=buff.bloodlust.react|fight_remains<30|buff.adrenaline_rush.up
    - blood_fury
    - berserking
    - fireblood
    - ancestral_call
    - trinket_1,if=trinket_1.sync
    - trinket_2,if=trinket_2.sync

  build:
    - ambush,if=talent.hidden_opportunity&buff.audacity.up
    - blade_flurry,if=talent.deft_maneuvers&enemies.combat.8y>=3
    - coup_de_grace,if=buff.disorienting_strikes.up
    - pistol_shot,if=talent.audacity&talent.hidden_opportunity&buff.opportunity.up&!buff.audacity.up
    - pistol_shot,if=talent.fan_the_hammer&buff.opportunity.up&(buff.opportunity.stack>=6|buff.opportunity.remains<2)
    - pistol_shot,if=talent.fan_the_hammer&buff.opportunity.up&(combo_points.deficit>=(1+talent.quick_draw+(talent.quick_draw*talent.fan_the_hammer.rank))&(combo_points>1|var.rtb_buff_count<2|!talent.deal_fate))
    - pistol_shot,if=!talent.fan_the_hammer&buff.opportunity.up&(energy.base_deficit>energy.regen*1.5|combo_points.deficit<=1|talent.quick_draw.enabled|talent.audacity.enabled&!buff.audacity.up)
    - pool_resource,if=talent.hidden_opportunity,for_next=1
    - ambush,if=talent.hidden_opportunity
    - sinister_strike
  defensives:
    - evasion,if=!cooldown.feint.ready&!buff.evasion.up&incoming_cast.player&incoming_cast.player.remains<0.1
    - feint,if=!buff.feint.up&incoming_cast.zephyr&incoming_cast.zephyr.remains<=0.2
    - feint,if=!buff.feint.up&talent.elusiveness.enabled&incoming_cast.player&incoming_cast.player.remains<0.1
    - feint,if=!buff.feint.up&incoming_cast.aoe&incoming_cast.aoe.remains<=0.2
    - cloak_of_shadows,if=player.has_magic_debuff
    - evasion,if=target.threat=3&(player.indungeon|player.inmythicplus|player.inraid)
    - crimson_vial,if=var.hp_low